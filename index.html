<html lang="en">
<head>

<title>Adeve — Media Buyer Assignment</title>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root{
  --bg:#fbfbfc; --surface:#ffffff; --ink:#1a1d24; --soft:#646b78; --faint:#9aa1ad;
  --line:#ecedf1; --line2:#e0e2e8;
  --brand:#4f46e5; --brand-ink:#4338ca; --brand-soft:#f0f1fe;
  --good:#11936a; --good-soft:#e9f7f1; --warn:#9a6b14; --warn-soft:#faf3e3; --bad:#d2403c; --bad-soft:#fdeceb;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:var(--brand)}
.topbar{border-bottom:1px solid var(--line);background:var(--surface)}
.topbar .inner{max-width:780px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:9px;font-weight:700;letter-spacing:-.01em;font-size:17px}
.brand .mark{width:24px;height:24px;border-radius:7px;background:var(--brand);color:#fff;display:grid;place-items:center;font-size:14px;font-weight:800}
.brand .sub{font-weight:500;color:var(--faint);font-size:12px}
.note{color:var(--faint);font-size:12.5px}
.wrap{max-width:780px;margin:0 auto;padding:44px 24px 140px}
.eyebrow{color:var(--brand);font-weight:600;font-size:12.5px;letter-spacing:.06em;text-transform:uppercase;margin:0 0 10px}
h1{font-size:28px;line-height:1.22;letter-spacing:-.02em;margin:0 0 12px;font-weight:800}
.lead{color:var(--soft);margin:0 0 20px;font-size:16px}
.meta{display:flex;flex-wrap:wrap;gap:18px;color:var(--soft);font-size:13.5px;padding-bottom:4px}
.meta b{color:var(--ink);font-weight:600}
.meta span{display:inline-flex;align-items:center;gap:6px}
hr.sep{border:none;border-top:1px solid var(--line);margin:42px 0 0}
.section{padding-top:38px}
.shead{display:flex;align-items:baseline;gap:11px;margin:0 0 4px}
.shead .n{color:var(--brand);font-weight:700;font-size:14px;font-variant-numeric:tabular-nums}
.shead h2{font-size:20px;letter-spacing:-.01em;margin:0;font-weight:700}
.hint{color:var(--soft);font-size:14px;margin:0 0 18px;max-width:62ch}
h3{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);font-weight:600;margin:24px 0 10px}
h3:first-child{margin-top:6px}
/* collapsible SOP */
details.sop{border:1px solid var(--line);border-radius:12px;background:var(--surface);margin-top:28px}
details.sop>summary{cursor:pointer;font-weight:600;color:var(--ink);padding:15px 18px;list-style:none;display:flex;align-items:center;gap:9px}
details.sop>summary::-webkit-details-marker{display:none}
details.sop>summary .plus{color:var(--brand);font-size:17px;width:14px;display:inline-block}
details.sop[open]>summary .plus::after{content:"–"} details.sop>summary .plus::after{content:"+"}
details.sop .body{padding:2px 18px 18px;color:var(--soft);font-size:14px}
/* tabs */
.tabs{display:flex;gap:4px;background:#f1f2f5;border-radius:10px;padding:4px;margin-bottom:6px;width:fit-content;max-width:100%;overflow:auto}
.tab{border:none;background:transparent;color:var(--soft);font:inherit;font-size:13.5px;font-weight:600;padding:7px 14px;border-radius:7px;cursor:pointer;white-space:nowrap}
.tab.on{background:var(--surface);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.06)}
.tabsub{display:flex;align-items:center;justify-content:space-between;margin:10px 0 8px}
.tabsub .t{font-size:13px;color:var(--faint);font-weight:500}
.dl{display:inline-flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--line2);color:var(--soft);border-radius:8px;padding:5px 11px;font-size:12.5px;font-weight:500;cursor:pointer}
.dl:hover{border-color:var(--brand);color:var(--brand)}
.scroll{overflow:auto;border:1px solid var(--line);border-radius:11px;max-height:330px}
table{border-collapse:collapse;width:100%;font-size:13px}
thead th{position:sticky;top:0;background:#fafafb;color:var(--faint);font-weight:600;text-align:right;padding:9px 12px;border-bottom:1px solid var(--line);white-space:nowrap}
tbody td{padding:8px 12px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap;font-variant-numeric:tabular-nums;color:var(--ink)}
tbody tr:last-child td{border-bottom:none}
th.l,td.l{text-align:left}
.muted td{color:var(--soft)}
input,select,textarea{font:inherit;color:var(--ink);background:var(--surface);border:1px solid var(--line2);border-radius:9px;padding:9px 11px;outline:none;transition:border-color .12s,box-shadow .12s}
input:focus,select:focus,textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
/* log grid */
.gridwrap{overflow:auto;border:1px solid var(--line);border-radius:11px}
table.grid{font-size:13px}
table.grid th{background:#fafafb}
table.grid td{padding:5px 7px;border-bottom:1px solid var(--line)}
table.grid input{width:96px;text-align:right;padding:6px 8px}
table.grid select{padding:6px 8px}
/* actions */
.actrow{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:13px 0;border-bottom:1px solid var(--line)}
.actrow:last-child{border-bottom:none}
.actrow .lab{font-size:14.5px}
.actrow .lab small{display:block;color:var(--faint);font-size:12px;margin-top:1px}
.actrow select{min-width:170px}
textarea{width:100%;min-height:230px;resize:vertical;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;line-height:1.65}
/* qa */
.spec{display:grid;grid-template-columns:1fr 1.3fr 1.3fr auto;border:1px solid var(--line);border-radius:11px;overflow:hidden;font-size:13.5px}
.spec>div{padding:11px 14px;border-bottom:1px solid var(--line)}
.spec .h{background:#fafafb;color:var(--faint);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
.spec .lab{font-weight:600}
.spec .v{color:var(--soft)}
.spec .chk{display:grid;place-items:center}
.spec input[type=checkbox]{width:18px;height:18px;accent-color:var(--brand);cursor:pointer}
/* submit */
.foot{position:sticky;bottom:0;margin-top:34px;background:linear-gradient(to top,var(--bg) 60%,transparent);padding:18px 0 8px}
.foot .box{background:var(--surface);border:1px solid var(--line2);border-radius:13px;padding:15px 16px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.foot .ids{display:flex;gap:10px;flex-wrap:wrap}.foot .ids input{flex:1;min-width:170px}
.btn{background:var(--brand);color:#fff;border:none;border-radius:10px;padding:11px 22px;font-size:15px;font-weight:600;cursor:pointer}
.btn:hover{background:var(--brand-ink)} .btn:disabled{opacity:.55;cursor:not-allowed}
.msg{font-size:13.5px;color:var(--soft)} .msg.err{color:var(--bad)}
.done{text-align:center;padding:70px 24px}
.done .tick{width:58px;height:58px;border-radius:50%;background:var(--good-soft);color:var(--good);display:grid;place-items:center;font-size:28px;margin:0 auto 20px}
.done .ref{font-family:ui-monospace,Menlo,monospace;background:#f1f2f5;border-radius:7px;padding:2px 8px}
/* admin */
.adm input{min-width:220px}
.tag{font-size:11.5px;font-weight:600;padding:2px 9px;border-radius:7px;text-transform:capitalize}
.tag.advance{background:var(--good-soft);color:var(--good)} .tag.hold{background:var(--warn-soft);color:var(--warn)} .tag.reject{background:var(--bad-soft);color:var(--bad)}
.scard{border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-top:14px;background:var(--surface)}
.row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:space-between}
.score{font-weight:800;font-size:19px} .score small{color:var(--faint);font-weight:600;font-size:13px}
.pills{display:flex;gap:7px;flex-wrap:wrap;margin:10px 0 0}
.spill{background:#f4f5f8;border-radius:7px;padding:3px 9px;font-size:12.5px;color:var(--soft)}
.flag{color:var(--bad);font-size:13px;margin:8px 0 0}
pre.mono{white-space:pre-wrap;background:#fafafb;border:1px solid var(--line);border-radius:9px;padding:12px;font-size:12.5px;font-family:ui-monospace,Menlo,monospace;color:var(--soft);margin:8px 0 0}
@media(max-width:640px){
  h1{font-size:24px}.wrap{padding:30px 16px 140px}
  .spec{grid-template-columns:1fr}.spec .h{display:none}
  .actrow{flex-direction:column;align-items:stretch}.actrow select{width:100%}
}
</style>
</head>

  // Task 4
  var qaState={};
  (function(){var s=document.createElement("div");s.className="spec";s.innerHTML='<div class="h">Field</div><div class="h">Spec (required)</div><div class="h">As-built (reported)</div><div class="h chk">Error?</div>';B.QA_FIELDS.forEach(function(f){qaState[f.id]=false;var a=document.createElement("div");a.className="lab";a.textContent=f.label;var b2=document.createElement("div");b2.className="v";b2.textContent=f.spec;var c=document.createElement("div");c.textContent=f.asbuilt;var d=document.createElement("div");d.className="chk";var cb=document.createElement("input");cb.type="checkbox";cb.onchange=function(){qaState[f.id]=cb.checked;};d.appendChild(cb);s.appendChild(a);s.appendChild(b2);s.appendChild(c);s.appendChild(d);});document.getElementById("qa").appendChild(s);})();

  // submit
  document.getElementById("send").onclick=function(){
    var name=document.getElementById("cname").value.trim(),mail=document.getElementById("cmail").value.trim(),msg=document.getElementById("msg");
    if(!name||!/.+@.+\..+/.test(mail)){msg.className="msg err";msg.textContent="Enter your name and a valid email.";return;}
    var qa=Object.keys(qaState).filter(function(k){return qaState[k];});
    var sub={name:name,email:mail,log:logState,actions:actState,status_text:document.getElementById("status").value,qa:qa};
    var btn=this;btn.disabled=true;msg.className="msg";msg.textContent="Submitting…";
    fetch(API,{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({action:"grade",submission:sub})}).then(function(r){return r.json();}).then(function(d){
      if(d.ok){root.innerHTML='<div class="done"><div class="tick">✓</div><h1>Thank you, '+esc(name)+'</h1><p class="lead">Your assignment has been received and recorded. Reference <span class="ref">'+esc(d.ref)+'</span>.</p><p class="note">We review every submission and reply to shortlisted candidates. You can close this tab.</p></div>';window.scrollTo(0,0);}
      else{btn.disabled=false;msg.className="msg err";msg.textContent=d.error||"Something went wrong — try again.";}
    }).catch(function(){btn.disabled=false;msg.className="msg err";msg.textContent="Network error — try again.";});
  };

  function sopHtml(){
    return ''+
    '<p style="color:var(--ink)"><b>Two accounts &amp; targets.</b> Google — Drishti Cataract: cataract/Lasik <b>leads</b>, target <b>CPA ₹600</b>. Meta — Wealth Wisdom Webinar: <b>registrations</b>, target <b>CPR ₹150</b>. CPA = spend ÷ leads; CPR = spend ÷ registrations.</p>'+
    '<p><b>The 3-day window</b> = the 3 most recent dates: 26, 27, 28 Jun. Sum spend &amp; results across those days, then apply each rule:</p>'+
    '<div class="scroll" style="max-height:none"><table><thead><tr><th class=l>Rule</th><th class=l>Fires when (3-day)</th><th class=l>Action</th></tr></thead><tbody>'+
    '<tr><td class=l>R1 · Pause</td><td class=l>spend ≥ ₹3,000 AND 0 results</td><td class=l>Pause it</td></tr>'+
    '<tr><td class=l>R2 · Flag</td><td class=l>CPA/CPR ≥ 50% over target (Google ≥₹900; Meta ≥₹225)</td><td class=l>Flag — don’t pause</td></tr>'+
    '<tr><td class=l>R3 · Scale</td><td class=l>CPA/CPR ≤ 70% of target (Google ≤₹420; Meta ≤₹105) AND volume (Google ≥5 conv; Meta ≥20 regs)</td><td class=l>Raise budget 20%</td></tr>'+
    '<tr><td class=l>R4 · Negative</td><td class=l>search term ≥ ₹800 spend AND 0 conversions (7-day)</td><td class=l>Add negative</td></tr>'+
    '<tr><td class=l>R5 · Flag freq</td><td class=l>Meta ad set frequency ≥ 3.0</td><td class=l>Flag — don’t act</td></tr>'+
    '</tbody></table></div>'+
    '<p style="margin-top:12px"><b>Precision matters.</b> A rule fires only when its line is met. ₹450 is not a Scale. 4 conversions is not enough. ₹780 is not a Negative. At-target = no action. Pause beats Flag/Scale.</p>';
  }

  /* ===== ADMIN ===== */
  function renderAdmin(){
    document.getElementById("topnote").textContent="Internal · Grading";
    root.innerHTML='<p class="eyebrow">Internal</p><h1>Grading dashboard</h1><p class="lead">Enter the team passcode to view ranked submissions.</p><div class="adm" style="display:flex;gap:12px;flex-wrap:wrap"><input id="pc" type="password" placeholder="Passcode"><button class="btn" id="go">View</button></div><div id="out"></div>';
    var out=document.getElementById("out"),btn=document.getElementById("go");
    btn.onclick=function(){btn.disabled=true;btn.textContent="Loading…";fetch(API,{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({action:"list",passcode:document.getElementById("pc").value})}).then(function(r){return r.json();}).then(function(d){btn.disabled=false;btn.textContent="Refresh";if(!d.ok){out.innerHTML='<div class="scard"><p class="msg err">'+esc(d.error||"Error")+'</p></div>';return;}draw(d.rows);}).catch(function(e){btn.disabled=false;btn.textContent="View";out.innerHTML='<div class="scard"><p class="msg err">'+esc(e)+'</p></div>';});};
    function tag(d){return '<span class="tag '+d+'">'+d+'</span>';}
    function draw(rows){
      if(!rows.length){out.innerHTML='<div class="scard"><p class="note">No submissions yet.</p></div>';return;}
      out.innerHTML='<p class="note" style="margin:20px 0 0">'+rows.length+' submission(s), ranked by total.</p>';
      rows.forEach(function(s){var bd=s.breakdown||{};var c=document.createElement("div");c.className="scard";
        c.innerHTML='<div class="row"><div class="row"><span class="score">'+s.total+'<small>/12</small></span> '+tag(s.decision)+' <div><b>'+esc(s.candidate_name)+'</b> <span class="note">'+esc(s.candidate_email)+'</span></div></div><span class="note">'+new Date(s.created_at).toLocaleString()+'</span></div>'+
        '<div class="pills"><span class="spill">Accuracy '+s.score_accuracy+'/3</span><span class="spill">Rules '+s.score_rules+'/3</span><span class="spill">Format '+s.score_format+'/3</span><span class="spill">Comms '+s.score_comms+'/3</span></div>'+
        (s.auto_flags||[]).map(function(f){return '<p class="flag">⚠ '+esc(f)+'</p>';}).join("")+
        '<p class="note" style="margin-top:8px">Task 1 bad rows: '+(bd.task1?bd.task1.badRows:"?")+' · Task 2 mistakes: '+(bd.task2?bd.task2.mistakes:"?")+' · Task 4 QA: +'+(bd.task4?bd.task4.correct.length:"?")+' / falsePos '+(bd.task4?bd.task4.falsePos.length:"?")+' / missed '+(bd.task4?bd.task4.falseNeg.length:"?")+'</p>'+
        '<details><summary class="note" style="cursor:pointer;margin-top:6px">Status update text</summary><pre class="mono">'+esc((s.answers&&s.answers.status_text)||"")+'</pre></details>';
        out.appendChild(c);});
    }
  }
})();
</script>
</body>
</html>
