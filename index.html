<style>
:root{
  --bg:#f5f6f8; --surface:#ffffff; --ink:#15181f; --ink-soft:#5b6472; --ink-faint:#8a93a3;
  --line:#e6e8ed; --line-strong:#d4d8e0;
  --brand:#4338ca; --brand-ink:#3730a3; --brand-soft:#eef0fe; --brand-ring:rgba(67,56,202,.25);
  --good:#0f9d6b; --good-soft:#e6f7f0; --warn:#b7791f; --warn-soft:#fdf6e7; --bad:#d33a36; --bad-soft:#fdeceb;
  --radius:14px; --shadow:0 1px 2px rgba(20,24,31,.04),0 8px 28px rgba(20,24,31,.06);
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
a{color:var(--brand)}
.topbar{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.82);backdrop-filter:saturate(180%) blur(10px);border-bottom:1px solid var(--line)}
.topbar .inner{max-width:980px;margin:0 auto;padding:13px 22px;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:-.02em;font-size:18px}
.brand .mark{width:26px;height:26px;border-radius:8px;background:var(--brand);color:#fff;display:grid;place-items:center;font-size:15px;font-weight:800}
.brand .sub{font-weight:500;color:var(--ink-faint);font-size:12.5px;letter-spacing:.02em}
.wrap{max-width:980px;margin:0 auto;padding:30px 22px 120px}
.hero{background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:30px 30px 26px;margin-bottom:26px}
.eyebrow{color:var(--brand);font-weight:700;font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;margin:0 0 8px}
h1{font-size:27px;line-height:1.2;letter-spacing:-.02em;margin:0 0 10px;font-weight:800}
.lead{color:var(--ink-soft);margin:0 0 18px;max-width:60ch}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.chip{display:inline-flex;align-items:center;gap:6px;background:#f3f4f8;border:1px solid var(--line);border-radius:999px;padding:5px 12px;font-size:12.5px;color:var(--ink-soft);font-weight:500}
.chip b{color:var(--ink)}
.callout{background:var(--brand-soft);border:1px solid #dfe1fb;border-radius:12px;padding:13px 15px;font-size:14px;color:var(--brand-ink)}
.callout b{color:var(--brand-ink)}
.section{margin-top:30px}
.sec-head{display:flex;align-items:flex-start;gap:13px;margin:0 0 6px}
.sec-num{flex:none;width:30px;height:30px;border-radius:9px;background:var(--brand);color:#fff;font-weight:700;font-size:14px;display:grid;place-items:center;margin-top:1px}
.sec-head h2{font-size:19px;letter-spacing:-.01em;margin:2px 0 0;font-weight:700}
.sec-head .hint{color:var(--ink-soft);font-size:13.5px;margin:3px 0 0}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px;margin-top:14px}
.card.tight{padding:0;overflow:hidden}
h3{font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-faint);font-weight:700;margin:20px 0 9px}
h3:first-child{margin-top:4px}
details.sop{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:4px 20px;margin-bottom:26px}
details.sop>summary{cursor:pointer;font-weight:600;color:var(--brand);padding:13px 0;list-style:none;display:flex;align-items:center;gap:8px}
details.sop>summary::-webkit-details-marker{display:none}
details.sop>summary::before{content:"+";font-size:18px;line-height:1;color:var(--brand)}
details.sop[open]>summary::before{content:"–"}
details.sop .body{padding:4px 0 18px;color:var(--ink-soft);font-size:14px}
.scroll{overflow:auto;border:1px solid var(--line);border-radius:12px;max-height:340px;background:var(--surface)}
table{border-collapse:collapse;width:100%;font-size:13px}
thead th{position:sticky;top:0;background:#f7f8fa;color:var(--ink-faint);font-weight:600;text-align:right;padding:9px 11px;border-bottom:1px solid var(--line);white-space:nowrap}
tbody td{padding:8px 11px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap;font-variant-numeric:tabular-nums}
tbody tr:nth-child(even){background:#fafbfc}
tbody tr:last-child td{border-bottom:none}
th.l,td.l{text-align:left}
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:9px;flex-wrap:wrap}
.dl{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line-strong);color:var(--ink-soft);border-radius:9px;padding:6px 12px;font-size:13px;font-weight:500;cursor:pointer}
.dl:hover{border-color:var(--brand);color:var(--brand)}
.acct-tag{font-size:12px;font-weight:600;color:var(--ink-faint)}
input,select,textarea{font:inherit;color:var(--ink);background:var(--surface);border:1px solid var(--line-strong);border-radius:9px;padding:8px 10px;outline:none;transition:border-color .12s,box-shadow .12s}
input:focus,select:focus,textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-ring)}
.grid-tbl input{width:100%;text-align:right;padding:6px 8px}
.grid-tbl select{width:100%;padding:6px 8px}
.grid-tbl td{padding:5px 7px}
textarea{width:100%;min-height:240px;resize:vertical;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;line-height:1.6}
.actrow{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:11px 2px;border-bottom:1px solid var(--line)}
.actrow:last-child{border-bottom:none}
.actrow .lab{font-size:14px}
.actrow .lab small{display:block;color:var(--ink-faint);font-size:12px;font-weight:500}
.actrow select{min-width:172px}
.spec{display:grid;grid-template-columns:1.1fr 1.4fr 1.4fr auto;border:1px solid var(--line);border-radius:12px;overflow:hidden;font-size:13.5px}
.spec>div{padding:10px 13px;border-bottom:1px solid var(--line)}
.spec .h{background:#f7f8fa;color:var(--ink-faint);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.04em}
.spec .lab{font-weight:600}
.spec .spec-val{color:var(--ink-soft)}
.spec .chk{display:grid;place-items:center}
.spec input[type=checkbox]{width:18px;height:18px;accent-color:var(--brand);cursor:pointer}
.idrow{display:flex;gap:12px;flex-wrap:wrap}
.idrow input{flex:1;min-width:200px}
.submitbar{position:sticky;bottom:0;z-index:40;margin-top:20px;background:linear-gradient(to top,var(--bg) 55%,transparent);padding:18px 0 6px}
.submitbar .box{background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.btn{background:var(--brand);color:#fff;border:none;border-radius:11px;padding:12px 22px;font-size:15px;font-weight:600;cursor:pointer;transition:transform .04s,background .12s}
.btn:hover{background:var(--brand-ink)}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.55;cursor:not-allowed}
.msg{font-size:13.5px;color:var(--ink-soft)}
.msg.err{color:var(--bad)}
.note{color:var(--ink-faint);font-size:12.5px}
.done{text-align:center;padding:50px 24px}
.done .tick{width:60px;height:60px;border-radius:50%;background:var(--good-soft);color:var(--good);display:grid;place-items:center;font-size:30px;margin:0 auto 18px}
.done h1{font-size:24px}
.done .ref{font-family:ui-monospace,Menlo,monospace;background:#f3f4f8;border:1px solid var(--line);border-radius:8px;padding:3px 9px}
/* admin */
.adm-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.tag{font-size:11.5px;font-weight:600;padding:2px 9px;border-radius:7px;text-transform:capitalize}
.tag.advance{background:var(--good-soft);color:var(--good)}
.tag.hold{background:var(--warn-soft);color:var(--warn)}
.tag.reject{background:var(--bad-soft);color:var(--bad)}
.score{font-weight:800;font-size:18px;letter-spacing:-.02em}
.pills{display:flex;gap:7px;flex-wrap:wrap;margin:8px 0}
.spill{background:#f3f4f8;border:1px solid var(--line);border-radius:8px;padding:3px 9px;font-size:12.5px;color:var(--ink-soft)}
.flagline{color:var(--bad);font-size:13px;margin:6px 0 0}
details.sub{border-top:1px solid var(--line);padding:12px 0}
details.sub summary{cursor:pointer;font-weight:600;list-style:none}
details.sub summary::-webkit-details-marker{display:none}
pre.mono{white-space:pre-wrap;background:#f7f8fa;border:1px solid var(--line);border-radius:10px;padding:12px;font-size:12.5px;font-family:ui-monospace,Menlo,monospace;color:var(--ink-soft);margin:8px 0 0}
@media(max-width:680px){
  h1{font-size:23px}.wrap{padding:22px 15px 120px}.hero{padding:22px 18px}
  .spec{grid-template-columns:1fr;}.spec>div{border-bottom:1px solid var(--line)}
  .spec .h{display:none}
  .actrow{flex-direction:column;align-items:stretch}.actrow select{min-width:0;width:100%}
}
</style>
</head>

    s.innerHTML = '<div class="h">Field</div><div class="h">Spec (required)</div><div class="h">As-built (reported)</div><div class="h chk">Error?</div>';
    B.QA_FIELDS.forEach(function(f){
      qaState[f.id]=false;
      var d1=document.createElement("div"); d1.className="lab"; d1.textContent=f.label;
      var d2=document.createElement("div"); d2.className="spec-val"; d2.textContent=f.spec;
      var d3=document.createElement("div"); d3.textContent=f.asbuilt;
      var d4=document.createElement("div"); d4.className="chk"; var cb=document.createElement("input"); cb.type="checkbox";
      cb.onchange=function(){ qaState[f.id]=cb.checked; }; d4.appendChild(cb);
      s.appendChild(d1); s.appendChild(d2); s.appendChild(d3); s.appendChild(d4);
    });
    document.getElementById("qa").appendChild(s);
  })();

  // ---- submit ----
  document.getElementById("send").onclick = function(){
    var name = document.getElementById("cname").value.trim();
    var mail = document.getElementById("cmail").value.trim();
    var msg = document.getElementById("msg");
    if (!name || !/.+@.+\..+/.test(mail)){ msg.className="msg err"; msg.textContent="Enter your name and a valid email."; return; }
    var qa = Object.keys(qaState).filter(function(k){ return qaState[k]; });
    var sub = { name:name, email:mail, log:logState, actions:actState, status_text:document.getElementById("status").value, qa:qa };
    var btn = this; btn.disabled = true; msg.className="msg"; msg.textContent = "Submitting…";
    fetch(API, { method:"POST", headers:{ "content-type":"application/json" }, body:JSON.stringify({ action:"grade", submission:sub }) })
      .then(function(r){ return r.json(); })
      .then(function(d){
        if (d.ok){
          root.innerHTML = '<div class="hero done"><div class="tick">✓</div><h1>Submitted — thank you, '+esc(name)+'</h1><p class="lead" style="margin:0 auto 6px">Your assignment has been received and recorded. Reference <span class="ref">'+esc(d.ref)+'</span>.</p><p class="note">We review every submission and reply to shortlisted candidates. You can close this tab.</p></div>';
          window.scrollTo(0,0);
        } else { btn.disabled=false; msg.className="msg err"; msg.textContent = d.error || "Something went wrong — try again."; }
      })
      .catch(function(){ btn.disabled=false; msg.className="msg err"; msg.textContent = "Network error — try again."; });
  };

  function sopHtml(){
    return ''+
    '<p style="color:var(--ink)"><b>Two accounts &amp; targets.</b> Google — Drishti Cataract: cataract/Lasik <b>leads</b>, target <b>CPA ₹600</b>. Meta — Wealth Wisdom Webinar: <b>registrations</b>, target <b>CPR ₹150</b>. CPA = spend ÷ leads; CPR = spend ÷ registrations.</p>'+
    '<p><b>The 3-day window</b> = the 3 most recent dates: 26, 27, 28 Jun. Sum spend &amp; results across those days, then apply each rule:</p>'+
    '<div class="scroll" style="max-height:none"><table><thead><tr><th class=l>Rule</th><th class=l>Fires when (3-day)</th><th class=l>Action</th></tr></thead><tbody>'+
    '<tr><td class=l>R1 · Pause</td><td class=l>spend ≥ ₹3,000 AND 0 results</td><td class=l>Pause it</td></tr>'+
    '<tr><td class=l>R2 · Flag</td><td class=l>CPA/CPR ≥ 50% over target (Google ≥₹900; Meta ≥₹225)</td><td class=l>Flag — don’t pause</td></tr>'+
    '<tr><td class=l>R3 · Scale</td><td class=l>CPA/CPR ≤ 70% of target (Google ≤₹420; Meta ≤₹105) AND volume (Google ≥5 conv; Meta ≥20 regs)</td><td class=l>Raise budget 20%</td></tr>'+
    '<tr><td class=l>R4 · Negative</td><td class=l>search term ≥ ₹800 spend AND 0 conversions (7-day figures)</td><td class=l>Add negative</td></tr>'+
    '<tr><td class=l>R5 · Flag freq</td><td class=l>Meta ad set frequency ≥ 3.0</td><td class=l>Flag — don’t act</td></tr>'+
    '</tbody></table></div>'+
    '<p style="margin-top:12px"><b>Precision matters.</b> A rule fires only when its line is met. ₹450 is not a Scale. 4 conversions is not enough. ₹780 is not a Negative. At-target = no action. Pause beats Flag/Scale. We are not asking for strategy — follow the SOP exactly.</p>';
  }

  /* =================== ADMIN =================== */
  function renderAdmin(){
    document.querySelector(".topbar .note").textContent = "Internal · Grading";
    root.innerHTML =
      '<div class="hero"><p class="eyebrow">Internal</p><h1>Grading dashboard</h1><p class="lead">Enter the team passcode to view ranked submissions.</p>'+
      '<div class="adm-row"><input id="pc" type="password" placeholder="Passcode" style="min-width:220px"><button class="btn" id="go">View submissions</button></div></div><div id="out"></div>';
    var out = document.getElementById("out"), btn = document.getElementById("go");
    btn.onclick = function(){
      btn.disabled=true; btn.textContent="Loading…";
      fetch(API, { method:"POST", headers:{ "content-type":"application/json" }, body:JSON.stringify({ action:"list", passcode:document.getElementById("pc").value }) })
        .then(function(r){ return r.json(); })
        .then(function(d){ btn.disabled=false; btn.textContent="Refresh"; if(!d.ok){ out.innerHTML='<div class="card"><p class="msg err">'+esc(d.error||"Error")+'</p></div>'; return; } draw(d.rows); })
        .catch(function(e){ btn.disabled=false; btn.textContent="View submissions"; out.innerHTML='<div class="card"><p class="msg err">'+esc(e)+'</p></div>'; });
    };
    function tag(dec){ return '<span class="tag '+dec+'">'+dec+'</span>'; }
    function draw(rows){
      if(!rows.length){ out.innerHTML='<div class="card"><p class="note">No submissions yet.</p></div>'; return; }
      out.innerHTML = '<p class="note" style="margin:18px 2px 8px">'+rows.length+' submission(s), ranked by total.</p>';
      rows.forEach(function(s){
        var bd = s.breakdown||{};
        var card = document.createElement("div"); card.className="card";
        var flags = (s.auto_flags||[]).map(function(f){ return '<p class="flagline">⚠ '+esc(f)+'</p>'; }).join("");
        card.innerHTML =
          '<div class="adm-row" style="justify-content:space-between"><div class="adm-row"><span class="score">'+s.total+'<span class="note">/12</span></span> '+tag(s.decision)+' <div><b>'+esc(s.candidate_name)+'</b> <span class="note">'+esc(s.candidate_email)+'</span></div></div><span class="note">'+new Date(s.created_at).toLocaleString()+'</span></div>'+
          '<div class="pills"><span class="spill">Accuracy '+s.score_accuracy+'/3</span><span class="spill">Rules '+s.score_rules+'/3</span><span class="spill">Format '+s.score_format+'/3</span><span class="spill">Comms '+s.score_comms+'/3</span></div>'+
          flags +
          '<p class="note" style="margin-top:8px">Task 1 bad rows: '+(bd.task1?bd.task1.badRows:"?")+' · Task 2 mistakes: '+(bd.task2?bd.task2.mistakes:"?")+' (missed '+(bd.task2?bd.task2.missed.length:"?")+', extra '+(bd.task2?bd.task2.extra.length:"?")+') · Task 4 QA: +'+(bd.task4?bd.task4.correct.length:"?")+' / falsePos '+(bd.task4?bd.task4.falsePos.length:"?")+' / missed '+(bd.task4?bd.task4.falseNeg.length:"?")+'</p>'+
          '<details class="sub"><summary class="note">Status update text</summary><pre class="mono">'+esc((s.answers&&s.answers.status_text)||"")+'</pre></details>';
        out.appendChild(card);
      });
    }
  }
})();
</script>
</body>
</html>
